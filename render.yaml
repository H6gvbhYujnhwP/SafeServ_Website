services:
  - type: web
    name: SafeServ_Website
    runtime: static
    buildCommand: npm install --legacy-peer-deps && npm run build:render
    staticPublishPath: dist/public
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
